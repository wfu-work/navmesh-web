<section class="device-page">
  <div class="device-header type-header">
    <title-label title="设备类型" description="设备类型即设备分组，用于注册默认值、列表筛选和访问策略归类。" />
    <button nz-button nzType="primary" (click)="openModal()">
      <nz-icon nzType="plus" />
      新建
    </button>
  </div>

  <nz-card class="card-border" [nzBordered]="false">
    <div class="group-toolbar">
      <h2>类型列表</h2>
      <div class="toolbar-actions">
        <nz-input-wrapper>
          <nz-icon nzInputPrefix nzType="search" />
          <input nz-input [(ngModel)]="q.keyword" placeholder="搜索类型、域名或说明" (keydown.enter)="search()" />
        </nz-input-wrapper>
        <nz-select nzAllowClear nzPlaceHolder="状态" [(ngModel)]="q.status" (ngModelChange)="search()">
          <nz-option nzValue="" nzLabel="全部状态" />
          <nz-option [nzValue]="1" nzLabel="启用" />
          <nz-option [nzValue]="0" nzLabel="禁用" />
        </nz-select>
        <button nz-button nzType="primary" (click)="search()">查询</button>
        <button nz-button (click)="reset()">重置</button>
      </div>
    </div>

    <st
      [data]="data"
      [columns]="columns"
      [loading]="loading"
      [pi]="q.page"
      [ps]="q.size"
      [total]="totalCount"
      (change)="tableChange($event)"
      bordered="false"
    >
      <ng-template st-row="nameRender" let-item>
        <div class="group-name-cell">
          <strong>{{ item.name || groupKey(item) }}</strong>
          <span>{{ item.remark || '设备类型' }}</span>
        </div>
      </ng-template>

      <ng-template st-row="iconRender" let-item>
        <span class="type-icon-preview" [title]="iconLabel(item.icon)">
          <nz-icon [nzType]="iconLabel(item.icon)" />
        </span>
      </ng-template>

      <ng-template st-row="keyRender" let-item>
        <code class="type-code">{{ groupKey(item) }}</code>
      </ng-template>

      <ng-template st-row="portRender" let-item>
        @if (item.defaultWebPort) {
          <code class="type-code">{{ item.defaultWebPort }}</code>
        } @else {
          <span class="text-grey">无默认 Web 端口</span>
        }
      </ng-template>

      <ng-template st-row="domainRender" let-item>
        @if (item.defaultDomain) {
          <code class="type-code">{{ item.defaultDomain }}</code>
        } @else {
          <span class="text-grey">仅 SSH 接入</span>
        }
      </ng-template>
    </st>
  </nz-card>
</section>
