<section class="device-page">
  <div class="device-header type-header">
    <title-label title="设备类型" description="设备类型即设备分组，用于注册默认值、列表筛选和访问策略归类。" />
    <button nz-button nzType="primary" (click)="openModal()">
      <nz-icon nzType="plus" />
      新建
    </button>
  </div>

  <nz-card class="card-border" [nzBordered]="false">
    <div class="group-toolbar">
      <h2>类型列表</h2>
      <div class="toolbar-actions">
        <nz-input-wrapper>
          <nz-icon nzInputPrefix nzType="search" />
          <input nz-input [(ngModel)]="q.keyword" placeholder="搜索类型、域名或说明" (keydown.enter)="search()" />
        </nz-input-wrapper>
        <nz-select nzAllowClear nzPlaceHolder="状态" [(ngModel)]="q.status" (ngModelChange)="search()">
          <nz-option nzValue="" nzLabel="全部状态" />
          <nz-option [nzValue]="1" nzLabel="启用" />
          <nz-option [nzValue]="0" nzLabel="禁用" />
        </nz-select>
        <button nz-button nzType="primary" (click)="search()">查询</button>
        <button nz-button (click)="reset()">重置</button>
      </div>
    </div>

    <st
      [data]="data"
      [columns]="columns"
      [loading]="loading"
      [pi]="q.page"
      [ps]="q.size"
      [total]="totalCount"
      (change)="tableChange($event)"
      bordered="false"
    >
      <ng-template st-row="nameRender" let-item>
        <div class="group-name-cell">
          <strong>{{ item.name || groupKey(item) }}</strong>
          <span>{{ item.remark || '设备类型' }}</span>
        </div>
      </ng-template>

      <ng-template st-row="keyRender" let-item>
        <code class="type-code">{{ groupKey(item) }}</code>
      </ng-template>

      <ng-template st-row="portRender" let-item>
        @if (item.defaultWebPort) {
          <code class="type-code">{{ item.defaultWebPort }}</code>
        } @else {
          <span class="text-grey">无默认 Web 端口</span>
        }
      </ng-template>

      <ng-template st-row="domainRender" let-item>
        @if (item.defaultDomain) {
          <code class="type-code">{{ item.defaultDomain }}</code>
        } @else {
          <span class="text-grey">仅 SSH 接入</span>
        }
      </ng-template>
    </st>
  </nz-card>

  <nz-modal
    [(nzVisible)]="modalVisible"
    [nzTitle]="editingGuid ? '编辑设备类型' : '新建设备类型'"
    [nzFooter]="groupFooter"
    (nzOnCancel)="modalVisible = false"
  >
    <ng-container *nzModalContent>
      <form nz-form [formGroup]="form" nzLayout="vertical">
        <div class="form-grid">
          <nz-form-item>
            <nz-form-label nzRequired>类型标识</nz-form-label>
            <nz-form-control nzErrorTip="请输入类型标识">
              <input nz-input formControlName="key" placeholder="例如 ssh、rain" [readonly]="!!editingGuid" />
            </nz-form-control>
          </nz-form-item>

          <nz-form-item>
            <nz-form-label nzRequired>类型名称</nz-form-label>
            <nz-form-control nzErrorTip="请输入类型名称">
              <input nz-input formControlName="name" placeholder="例如 SSH 接入、气象雨量" />
            </nz-form-control>
          </nz-form-item>
        </div>

        <div class="form-grid">
          <nz-form-item>
            <nz-form-label>默认 Web 端口</nz-form-label>
            <nz-form-control>
              <nz-input-number class="w-100" formControlName="defaultWebPort" [nzMin]="0" [nzMax]="65535" />
            </nz-form-control>
          </nz-form-item>

          <nz-form-item>
            <nz-form-label>排序</nz-form-label>
            <nz-form-control>
              <nz-input-number class="w-100" formControlName="sort" [nzMin]="0" [nzMax]="9999" />
            </nz-form-control>
          </nz-form-item>
        </div>

        <nz-form-item>
          <nz-form-label>默认映射域名</nz-form-label>
          <nz-form-control>
            <input nz-input formControlName="defaultDomain" placeholder="例如 vpn-rain.navfirst.com" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label>说明</nz-form-label>
          <nz-form-control>
            <textarea nz-input rows="3" formControlName="remark" placeholder="用于描述这类设备的接入默认值"></textarea>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label>状态</nz-form-label>
          <nz-form-control>
            <nz-select formControlName="status">
              <nz-option [nzValue]="1" nzLabel="启用" />
              <nz-option [nzValue]="0" nzLabel="禁用" />
            </nz-select>
          </nz-form-control>
        </nz-form-item>
      </form>
    </ng-container>

    <ng-template #groupFooter>
      <button nz-button (click)="modalVisible = false">取消</button>
      <button nz-button nzType="primary" [nzLoading]="saving" (click)="save()">
        <nz-icon nzType="save" />
        保存
      </button>
    </ng-template>
  </nz-modal>
</section>
