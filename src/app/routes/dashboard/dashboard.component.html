<section class="dashboard-page">
  <title-label title="工作台" description="实时掌握设备在线、4G 卡流量、HTTP 映射、访问会话与运行事件。" />

  <div class="dashboard-actions">
    <button nz-button [nzLoading]="loading" (click)="load()">
      <nz-icon nzType="reload" />
      刷新
    </button>
  </div>

  <div class="dashboard-panels">
    <app-panel
      icon="desktop"
      title="在线设备"
      [value]="onlineDeviceCount() + ' / ' + devices.length"
      trend="在线/总数"
      trendType="neutral"
    />
    <app-panel
      icon="bar-chart"
      title="4G 卡流量"
      [value]="formatBytes(trafficSummary().total)"
      [trend]="'收 ' + formatBytes(trafficSummary().inbound) + ' / 发 ' + formatBytes(trafficSummary().outbound)"
      trendType="neutral"
    />
    <app-panel
      icon="api"
      title="HTTP 映射"
      [value]="enabledMappingCount() + ' / ' + mappings.length"
      [trend]="recentFailureCount() + ' 个近期失败'"
      [trendType]="recentFailureCount() ? 'down' : 'neutral'"
    />
    <app-panel
      icon="alert"
      title="未处理事件"
      [value]="openEventCount() + ''"
      [trend]="events.length + ' 条最近事件'"
      [trendType]="openEventCount() ? 'down' : 'neutral'"
    />
  </div>

  <div class="dashboard-widgets">
    <dashboard-traffic-trend
      [buckets]="trafficDistribution()"
      [windowLabel]="trafficWindowLabel()"
      [windowOptions]="trafficWindowOptions"
      [(windowValue)]="trafficWindow"
    />
    <dashboard-active-rules
      [offlineDevices]="devices.length - onlineDeviceCount()"
      [httpFailures]="recentFailureCount()"
      [openEvents]="openEventCount()"
    />
  </div>

  <div class="dashboard-guidance">
    <dashboard-advice [insights]="dashboardInsights()" [windowLabel]="trafficWindowLabel()" />
    <dashboard-shortcuts />
  </div>
</section>
