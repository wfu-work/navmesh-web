<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="NavMesh logo">
  <defs>
    <linearGradient id="navmesh-panel" x1="48" y1="28" x2="154" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fffb"/>
      <stop offset="0.54" stop-color="#e7f6f1"/>
      <stop offset="1" stop-color="#d7eceb"/>
    </linearGradient>
    <linearGradient id="navmesh-ring" x1="40" y1="32" x2="160" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10a36d"/>
      <stop offset="0.58" stop-color="#087f74"/>
